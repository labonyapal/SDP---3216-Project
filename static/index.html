<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University User Registration Portal</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Outfit (headings) and Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, button {
      font-family: 'Outfit', sans-serif;
    }
    .glass-card {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-input {
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-input:focus {
      background: rgba(30, 41, 59, 0.55);
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }
    .animate-float {
      animation: float 8s ease-in-out infinite;
    }
    .animate-float-delayed {
      animation: float 10s ease-in-out infinite 2s;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans overflow-x-hidden relative p-4">
  
  <!-- Animated Background Orbs -->
  <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] rounded-full bg-indigo-500/10 blur-[100px] pointer-events-none animate-float"></div>
  <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[400px] h-[400px] rounded-full bg-purple-500/10 blur-[120px] pointer-events-none animate-float-delayed"></div>

  <!-- Registration Card Container -->
  <div class="w-full max-w-md glass-card rounded-3xl p-8 shadow-2xl relative overflow-hidden z-10">
    
    <!-- Top accent border glow -->
    <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex p-3 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-4 text-indigo-400">
        <!-- Graduation Cap Icon -->
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A5.905 5.905 0 018 3.443m4.378-2.022a11.968 11.968 0 00-4.378 2.022m4.378-2.022a11.969 11.969 0 014.378 2.022m0 0A5.905 5.905 0 0116 3.443m-8 0a3 3 0 106 0v6.082"></path>
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-200 via-purple-200 to-pink-200">
        Registration Portal
      </h2>
      <p class="text-slate-400 mt-2 text-sm">Create your university workspace account</p>
    </div>

    <!-- Form -->
    <form id="registration-form" class="space-y-6">
      
      <!-- Username Field -->
      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
            <!-- User Icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </div>
          <input type="text" id="username" name="username" required placeholder="e.g. johndoe" 
            class="glass-input block w-full pl-10 pr-4 py-3 rounded-xl text-slate-100 placeholder-slate-500 text-sm focus:outline-none">
        </div>
      </div>

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
            <!-- Mail Icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
          </div>
          <input type="email" id="email" name="email" required placeholder="e.g. johndoe@university.edu" 
            class="glass-input block w-full pl-10 pr-4 py-3 rounded-xl text-slate-100 placeholder-slate-500 text-sm focus:outline-none">
        </div>
      </div>

      <!-- Role Field -->
      <div>
        <label for="role" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Academic Role</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
            <!-- Identification Card Icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.378 0 2.473-.442 3-1.097V17H5v-3.097c.527.655 1.622 1.097 3 1.097z"></path>
            </svg>
          </div>
          <select id="role" name="role" required 
            class="glass-input block w-full pl-10 pr-10 py-3 rounded-xl text-slate-100 text-sm focus:outline-none appearance-none cursor-pointer">
            <option value="Student" class="bg-slate-900 text-slate-100">Student</option>
            <option value="Teacher" class="bg-slate-900 text-slate-100">Teacher</option>
            <option value="Staff" class="bg-slate-900 text-slate-100">Staff</option>
          </select>
          <!-- Custom Chevron Dropdown Arrow -->
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submit-btn" 
        class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-600 hover:to-pink-600 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2">
        <svg id="btn-spinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="btn-text">Register Account</span>
      </button>

    </form>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full px-4 sm:px-0 pointer-events-none"></div>

  <!-- Frontend Logic -->
  <script>
    document.getElementById('registration-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const emailInput = document.getElementById('email');
      const roleSelect = document.getElementById('role');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      
      const username = usernameInput.value.trim();
      const email = emailInput.value.trim();
      const role = roleSelect.value;
      
      // Basic Frontend Validation
      if (!username || username.length < 3) {
        showToast('Username must be at least 3 characters long.', 'error');
        return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('Please enter a valid email address.', 'error');
        return;
      }
      
      // Update UI state to loading
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
      btnText.textContent = 'Processing...';
      btnSpinner.classList.remove('hidden');
      
      try {
        const response = await fetch(`/auth/register/${role.toLowerCase()}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showToast(`Success: Registered as ${data.role}!`, 'success');
          // Reset form inputs
          usernameInput.value = '';
          emailInput.value = '';
          roleSelect.value = 'Student';
        } else {
          // Process backend detail message
          const errorMsg = data.detail || 'Registration failed.';
          showToast(`Error: ${errorMsg}`, 'error');
        }
      } catch (error) {
        console.error('Registration API error:', error);
        showToast('Network error: Could not reach backend server.', 'error');
      } finally {
        // Restore button state
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        btnText.textContent = 'Register Account';
        btnSpinner.classList.add('hidden');
      }
    });

    // Elegant toast notifications
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      // Style toast
      toast.className = `transform translate-y-2 opacity-0 transition-all duration-300 ease-out flex items-center p-4 rounded-2xl shadow-2xl border pointer-events-auto backdrop-blur-md`;
      
      let bgClass, borderClass, iconColor, iconSvg;
      
      if (type === 'success') {
        bgClass = 'bg-emerald-950/85';
        borderClass = 'border-emerald-500/20';
        iconColor = 'text-emerald-400';
        iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      } else if (type === 'error') {
        bgClass = 'bg-rose-950/85';
        borderClass = 'border-rose-500/20';
        iconColor = 'text-rose-400';
        iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      } else {
        bgClass = 'bg-slate-900/85';
        borderClass = 'border-indigo-500/20';
        iconColor = 'text-indigo-400';
        iconSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      }
      
      toast.className += ` ${bgClass} ${borderClass}`;
      
      toast.innerHTML = `
        <div class="flex-shrink-0 ${iconColor}">
          ${iconSvg}
        </div>
        <div class="ml-3 text-sm font-medium text-slate-100 flex-grow pr-2">${message}</div>
        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-200 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      `;
      
      container.appendChild(toast);
      
      // Animate entry
      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 10);
      
      // Auto close after 4 seconds
      setTimeout(() => {
        toast.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 4000);
    }
  </script>
</body>
</html>
